name: Build SOEM Debian Packages

on:
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.arch }} package
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-22.04
          - arch: arm64
            runner: ubuntu-22.04-arm

    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build Debian package
        env:
          ARCH: ${{ matrix.arch }}
          INSTALL_DEPS: "1"
        run: ./build_deb.sh

      - name: Upload Debian package
        uses: actions/upload-artifact@v4
        with:
          name: libsoem-dev-${{ matrix.arch }}
          path: output/libsoem-dev_2.0.0.1_${{ matrix.arch }}.deb
          retention-days: 7